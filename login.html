<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — Alerta Segura</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <div class="login-layout">
    <div class="login-card">

      <!-- Logo -->
      <div class="card-logo">
        <div class="dot"></div>
        <a href="index.html">Alerta<strong>Segura</strong></a>
      </div>

      <!-- Header -->
      <div class="card-header">
        <h1>Bienvenido de vuelta</h1>
        <p>Ingresa tus credenciales para acceder al panel de seguridad.</p>
      </div>

      <!-- Error -->
      <div class="error-banner" id="errorBanner">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errorMsg">Correo o contraseña incorrectos.</span>
      </div>

      <!-- Form -->
      <form id="loginForm" novalidate>

        <div class="field">
          <label for="correo">Correo electrónico</label>
          <input type="email" id="correo" name="correo"
            placeholder="tucorreo@ejemplo.com" required autocomplete="username" />
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <div class="password-wrap" style="position:relative">
            <input type="password" id="password" name="password"
              placeholder="••••••••" required autocomplete="current-password"
              style="padding-right:48px" />
            <button type="button" id="eyeBtn" aria-label="Mostrar contraseña"
              style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#7A8FA6;display:flex;align-items:center;">
              <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <a class="forgot-link" href="#">¿Olvidaste tu contraseña?</a>

        <button type="submit" class="btn btn-primary btn-login" id="submitBtn">
          <svg width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
          </svg>
          Ingresar
        </button>

        <p class="register-link">
          ¿No tienes cuenta? <a href="registro.html">Regístrate gratis</a>
        </p>

      </form>

    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
